<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"></head><body><title>우리어디</title>
<style>
:root{
  --bg:#FBF6ED; --surface:#FFFFFF; --surface2:#F6EEDF; --ink:#4C4136; --muted:#96887A;
  --line:#EADFCC; --accent:#E98E7E; --accent-ink:#FFFFFF; --danger:#C95B4A;
  --map0:#F2EBDC; --map-visited:#F3E3C2; --map-stroke:#E3D7C0; --prov-stroke:#C2B096;
  --food:#D98E4F; --shadow:0 10px 26px rgba(76,65,54,.12);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#221D17; --surface:#2C261F; --surface2:#362F27; --ink:#F0E8DC; --muted:#A8998A;
    --line:#453C31; --accent:#F0A090; --accent-ink:#2A1E18; --danger:#E58873;
    --map0:#332C24; --map-visited:#4A3E2C; --map-stroke:#262019; --prov-stroke:#6B5D4A;
    --food:#E5A76A; --shadow:0 10px 26px rgba(0,0,0,.4);
  }
}
:root[data-theme="light"]{
  --bg:#FBF6ED; --surface:#FFFFFF; --surface2:#F6EEDF; --ink:#4C4136; --muted:#96887A;
  --line:#EADFCC; --accent:#E98E7E; --accent-ink:#FFFFFF; --danger:#C95B4A;
  --map0:#F2EBDC; --map-visited:#F3E3C2; --map-stroke:#E3D7C0; --prov-stroke:#C2B096;
  --food:#D98E4F; --shadow:0 10px 26px rgba(76,65,54,.12);
}
:root[data-theme="dark"]{
  --bg:#221D17; --surface:#2C261F; --surface2:#362F27; --ink:#F0E8DC; --muted:#A8998A;
  --line:#453C31; --accent:#F0A090; --accent-ink:#2A1E18; --danger:#E58873;
  --map0:#332C24; --map-visited:#4A3E2C; --map-stroke:#262019; --prov-stroke:#6B5D4A;
  --food:#E5A76A; --shadow:0 10px 26px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);
  font-family:'Pretendard Variable',Pretendard,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  font-size:15px;line-height:1.55;-webkit-tap-highlight-color:transparent}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
input,textarea,select{font:inherit;color:var(--ink)}
a{color:inherit}
.app{max-width:1280px;margin:0 auto;padding:16px clamp(12px,3vw,32px) 48px}

/* ---------- header ---------- */
header{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;
  padding:6px 2px 16px;margin-bottom:18px;position:relative}
header::after{content:'';position:absolute;left:0;right:0;bottom:0;height:3px;
  background:radial-gradient(circle 1.6px at 6px 50%, var(--prov-stroke) 92%, transparent) repeat-x;
  background-size:12px 3px}
.eyebrow{font-size:11px;letter-spacing:.24em;color:var(--muted);font-weight:700}
h1{margin:2px 0 0;font-size:clamp(23px,3.4vw,30px);font-weight:800;letter-spacing:-.02em;text-wrap:balance}
h1 .squig{display:block;width:150px;height:7px;margin-top:2px}
.title-edit{font-size:15px;color:var(--muted);margin-left:6px;width:28px;height:28px;
  border-radius:8px;vertical-align:4px}
.title-edit:hover{color:var(--accent);background:var(--surface2)}
.title-input{font:inherit;font-weight:800;letter-spacing:-.02em;color:var(--ink);
  background:var(--surface);border:2px dashed var(--accent);border-radius:10px;
  padding:0 8px;width:min(240px,60vw)}
.title-input:focus{outline:none}
h1 .squig path{stroke:var(--accent);stroke-width:2.5;fill:none;stroke-linecap:round}
.head-right{display:flex;align-items:center;gap:14px}
.progress{text-align:right}
.progress-num{font-size:13px;color:var(--muted)}
.progress-num b{color:var(--ink);font-size:17px;font-variant-numeric:tabular-nums}
.bar{width:150px;height:8px;border-radius:4px;background:var(--surface2);margin-top:5px;overflow:hidden}
.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#F6C6A2,var(--accent));
  border-radius:4px;transition:width .5s ease}
.icon-btn{width:38px;height:38px;border-radius:12px;border:1.5px solid var(--line);background:var(--surface);
  display:grid;place-items:center;font-size:16px}
.icon-btn:hover{border-color:var(--accent)}
.menu-wrap{position:relative}
.menu{position:absolute;right:0;top:46px;z-index:40;background:var(--surface);border:1.5px solid var(--line);
  border-radius:14px;box-shadow:var(--shadow);min-width:190px;padding:6px;display:flex;flex-direction:column}
.menu button{text-align:left;padding:9px 12px;border-radius:9px;font-size:14px}
.menu button:hover{background:var(--surface2)}
.menu button.danger{color:var(--danger)}
.hidden{display:none !important}

/* ---------- layout ---------- */
main{display:grid;grid-template-columns:minmax(0,1fr) 410px;gap:20px;align-items:start}
@media (max-width:980px){
  main{grid-template-columns:1fr}
  .map-wrap svg{max-height:62vh}
}

/* ---------- map ---------- */
.map-wrap{position:relative;background:var(--surface);border:1.5px solid var(--line);border-radius:22px;
  padding:8px;overflow:hidden}
.map-wrap>svg{display:block;width:100%;height:auto}
#mapG{transition:transform .7s cubic-bezier(.3,.7,.25,1);transform-origin:0 0;will-change:transform}
#mapG .muni{fill:var(--map0);stroke:var(--map-stroke);stroke-width:.7;cursor:pointer;
  transition:fill .3s ease,opacity .45s ease}
#mapG .muni.visited{fill:var(--map-visited)}
#mapG .muni:hover{filter:brightness(1.05) saturate(1.12)}
#mapG .muni.dim{opacity:.16}
#mapG .muni.sel{stroke:var(--accent);stroke-width:1.2}
#provG path{fill:none;stroke:var(--prov-stroke);stroke-width:1.4;pointer-events:none;
  transition:opacity .45s ease}
#stampsG{pointer-events:none}
#stampsG .stamp{transition:transform .7s cubic-bezier(.3,.7,.25,1),opacity .4s ease}
#stampsG .stamp>circle{fill:#FFFDF8;stroke:#E8DCC6;stroke-width:1}
#stampsG .stamp{filter:drop-shadow(0 1.5px 2px rgba(76,65,54,.25))}
#labelsG text{fill:var(--ink);paint-order:stroke;stroke:var(--surface);stroke-width:.35em;
  font-weight:700;pointer-events:none;text-anchor:middle;transition:opacity .4s ease}
.map-tools{position:absolute;top:14px;left:14px;z-index:5;display:flex;gap:8px}
.chip-btn{background:var(--surface);border:1.5px solid var(--line);border-radius:999px;
  padding:7px 15px;font-size:13px;font-weight:700;box-shadow:var(--shadow)}
.chip-btn:hover{border-color:var(--accent);color:var(--accent)}
.tooltip{position:absolute;z-index:6;pointer-events:none;background:var(--ink);color:var(--bg);
  font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:10px;white-space:nowrap;
  transform:translate(-50%,-135%)}
.tooltip small{display:block;font-weight:500;opacity:.75}
.map-note{position:absolute;left:16px;bottom:12px;font-size:11.5px;color:var(--muted)}
.go-panel{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;z-index:7;
  display:none;background:var(--accent);color:var(--accent-ink);border-radius:999px;
  padding:10px 20px;font-size:14px;font-weight:800;box-shadow:var(--shadow)}
.go-panel:active{filter:brightness(1.08)}
.to-map{display:none}
@media (max-width:980px){
  .go-panel.show{display:block}
  .to-map{display:inline-block}
}
.credit{position:absolute;right:16px;bottom:12px;font-size:10.5px;color:var(--muted);opacity:.7}

/* ---------- panel ---------- */
#panel{background:var(--surface);border:1.5px solid var(--line);border-radius:22px;padding:20px;min-height:480px}
.panel-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;flex-wrap:wrap}
.panel-head h2{margin:0;font-size:21px;font-weight:800;letter-spacing:-.01em}
.panel-head .crumb{font-size:12.5px;color:var(--muted)}
.back-btn{width:34px;height:34px;border-radius:11px;border:1.5px solid var(--line);flex:none;font-size:15px}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.visit-toggle{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;
  cursor:pointer;user-select:none;padding:7px 13px;border-radius:999px;border:1.5px solid var(--line)}
.visit-toggle input{accent-color:var(--accent);width:15px;height:15px;margin:0;cursor:pointer}
.visit-toggle.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:4px 0 14px}
.stat{background:var(--surface2);border-radius:14px;padding:10px 6px;text-align:center}
.stat b{display:block;font-size:20px;font-variant-numeric:tabular-nums;line-height:1.2}
.stat span{font-size:11.5px;color:var(--muted)}
button.stat:hover{box-shadow:inset 0 0 0 1.5px var(--accent)}
.list-wrap{display:flex;flex-direction:column;gap:6px}
.list-sub{font-size:11.5px;color:var(--muted);font-weight:800;letter-spacing:.06em;margin:10px 2px 2px}
.list-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;
  border:1.5px solid var(--line);font-size:13.5px;text-align:left;background:var(--surface)}
.list-item:hover{border-color:var(--accent)}
.list-item.col{flex-direction:column;align-items:stretch;gap:2px}
.li-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.li-sub{font-size:12px;color:var(--muted)}
.hint{font-size:13.5px;color:var(--muted);margin:0 0 14px}
.year-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:0 0 14px}
.year-row>span{font-size:12px;color:var(--muted);font-weight:700;margin-right:2px}
.ychip{border:1.5px solid var(--line);border-radius:999px;padding:4px 13px;font-size:12.5px;
  font-weight:700;font-variant-numeric:tabular-nums}
.ychip:hover{border-color:var(--accent)}
.ychip.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.item .edit{position:absolute;top:9px;right:37px;width:24px;height:24px;border-radius:7px;
  color:var(--muted);font-size:12px;line-height:1}
.item .edit:hover{color:var(--accent);background:var(--surface)}

.prov-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.prov-grid button,.muni-grid button{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:12px;
  border:1.5px solid var(--line);font-size:13.5px;text-align:left;background:var(--surface)}
.prov-grid button:hover,.muni-grid button:hover{border-color:var(--accent)}
.dot{width:10px;height:10px;border-radius:50%;background:var(--map0);flex:none;border:1px solid var(--line)}
.cnt{margin-left:auto;font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;flex:none}
.muni-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:340px;overflow-y:auto;padding:2px}
.muni-grid .mini-stamp{width:20px;height:20px;flex:none;margin-left:-2px}

/* 색·스탬프 선택 */
.deco-row{background:var(--surface2);border-radius:14px;padding:12px 13px;margin-bottom:10px}
.deco-row h4{margin:0 0 8px;font-size:12.5px;color:var(--muted);letter-spacing:.04em}
.swatches{display:flex;flex-wrap:wrap;gap:7px}
.swatches button{width:30px;height:30px;border-radius:50%;border:2px solid rgba(0,0,0,.08);position:relative}
.swatches button.none{background:var(--surface);border:2px dashed var(--line);font-size:13px;color:var(--muted)}
.swatches button.on{outline:2.5px solid var(--accent);outline-offset:2px}
.stamp-cur{display:flex;align-items:center;gap:10px}
.stamp-cur .prev{width:46px;height:46px;flex:none;background:#FFFDF8;border:1.5px solid var(--line);
  border-radius:50%;display:grid;place-items:center;box-shadow:0 2px 4px rgba(76,65,54,.15)}
.stamp-cur .prev svg{width:36px;height:36px}
.stamp-cur .nm{font-size:13.5px;font-weight:700}
.stamp-cur .nm small{display:block;color:var(--muted);font-weight:500;font-size:11.5px}
.stamp-cur .actions{margin-left:auto;display:flex;gap:6px}

.sect{margin-top:18px;border-top:2px dashed var(--line);padding-top:13px}
.sect-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sect-head h3{margin:0;font-size:14px}
.sect-head h3 .n{color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
.add-btn{font-size:12.5px;font-weight:800;color:var(--accent);border:1.5px solid var(--line);
  border-radius:999px;padding:5px 13px}
.add-btn:hover{border-color:var(--accent)}
.empty{font-size:13px;color:var(--muted);background:var(--surface2);border-radius:12px;
  padding:12px 14px;text-align:center;border:1.5px dashed var(--line)}

.item{background:var(--surface2);border-radius:14px;padding:11px 13px;margin-bottom:8px;position:relative}
.item .t{font-weight:700;font-size:14.5px;padding-right:58px}
.item .d{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.item .m{font-size:13.5px;margin-top:4px;white-space:pre-wrap;word-break:break-word}
.item .stars{color:var(--food);font-size:13px;letter-spacing:1px}
.item .del{position:absolute;top:9px;right:9px;width:24px;height:24px;border-radius:7px;
  color:var(--muted);font-size:13px;line-height:1}
.item .del:hover{color:var(--danger);background:var(--surface)}
.badge-food{display:inline-block;font-size:11px;font-weight:800;color:var(--food);
  border:1.5px solid currentColor;border-radius:6px;padding:0 5px;margin-right:6px;vertical-align:1px}
.links{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.lchip{font-size:11.5px;font-weight:700;text-decoration:none;border:1.5px solid var(--line);
  border-radius:999px;padding:3px 10px;background:var(--surface)}
.lchip:hover{border-color:var(--accent);color:var(--accent)}

.form{background:var(--surface2);border-radius:14px;padding:13px;margin-bottom:10px;
  display:flex;flex-direction:column;gap:8px}
.form input[type=text],.form input[type=date],.form textarea,.form select{
  width:100%;border:1.5px solid var(--line);border-radius:9px;background:var(--surface);
  padding:8px 10px;font-size:14px}
.form textarea{resize:vertical;min-height:58px}
.form input:focus,.form textarea:focus,.form select:focus{outline:2px solid var(--accent);outline-offset:-1px}
.form-row{display:flex;gap:8px}
.form-row>*{flex:1}
.form-actions{display:flex;gap:8px;justify-content:flex-end}
.btn{border-radius:999px;padding:7px 18px;font-size:13.5px;font-weight:800}
.btn.primary{background:var(--accent);color:var(--accent-ink)}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{border:1.5px solid var(--line);color:var(--muted)}
.star-pick{display:flex;gap:2px;font-size:22px;color:var(--line)}
.star-pick button.on{color:var(--food)}

.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.photo-grid button{aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:var(--surface2)}
.photo-grid img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s ease}
.photo-grid button:hover img{transform:scale(1.05)}

/* ---------- 스탬프 선택 모달 ---------- */
.modal{position:fixed;inset:0;z-index:90;background:rgba(40,32,24,.5);display:flex;
  align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--surface);border-radius:20px;box-shadow:var(--shadow);width:min(520px,96vw);
  max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{display:flex;align-items:center;gap:10px;padding:15px 18px 0}
.modal-head h3{margin:0;font-size:16px;flex:1}
.modal-head .x{width:30px;height:30px;border-radius:9px;font-size:15px;color:var(--muted)}
.modal-head .x:hover{background:var(--surface2)}
.tabs{display:flex;gap:6px;padding:12px 18px 10px}
.tabs button{border:1.5px solid var(--line);border-radius:999px;padding:5px 15px;font-size:13px;font-weight:700}
.tabs button.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.stamp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px;
  padding:4px 18px 18px;overflow-y:auto}
.stamp-grid button{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px 8px;
  border-radius:14px;border:1.5px solid var(--line);font-size:11.5px;font-weight:700}
.stamp-grid button:hover{border-color:var(--accent);background:var(--surface2)}
.stamp-grid button.on{border-color:var(--accent);outline:1.5px solid var(--accent)}
.stamp-grid svg{width:42px;height:42px}

/* ---------- lightbox / toast ---------- */
.lightbox{position:fixed;inset:0;z-index:100;background:rgba(20,15,10,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px}
.lightbox img{max-width:min(92vw,900px);max-height:70vh;border-radius:12px;object-fit:contain}
.lb-bar{display:flex;gap:10px;align-items:center;width:min(92vw,900px);flex-wrap:wrap}
.lb-bar input{flex:1;min-width:150px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);
  color:#fff;border-radius:9px;padding:8px 12px;font-size:14px}
.lb-bar input::placeholder{color:rgba(255,255,255,.5)}
.lb-btn{color:#fff;border:1.5px solid rgba(255,255,255,.3);border-radius:999px;padding:8px 15px;font-size:13px}
.lb-btn:hover{background:rgba(255,255,255,.12)}
.lb-btn.danger{color:#FFA894;border-color:#FFA894}
.lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:26px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:120;
  background:var(--ink);color:var(--bg);padding:10px 20px;border-radius:999px;font-size:13.5px;
  font-weight:700;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .3s;max-width:90vw}
.toast.show{opacity:1}

@media (max-width:560px){
  body{font-size:14.5px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .prov-grid,.muni-grid{grid-template-columns:1fr 1fr}
  .photo-grid{grid-template-columns:repeat(2,1fr)}
  .progress .bar{width:110px}
  #panel{padding:16px}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;animation:none !important}
}
</style>

<!-- ============ 크레파스 스탬프 아이콘 ============ -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
<filter id="crayon" x="-8%" y="-8%" width="116%" height="116%">
  <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="2" seed="7" result="n"/>
  <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
</filter>
<g id="ico-defs"></g>
<symbol id="st-wave" viewBox="0 0 40 40"><g filter="url(#crayon)"><path d="M4 22q4-7 8 0t8 0 8 0 8 0" fill="none" stroke="#5E9BC0" stroke-width="2.8" stroke-linecap="round"/><path d="M7 29q4-6 7 0t7.5 0 8 0" fill="none" stroke="#8FC3E0" stroke-width="2.5" stroke-linecap="round"/><circle cx="30" cy="12" r="2" fill="#8FC3E0"/><circle cx="24" cy="9" r="1.4" fill="#BBDDF0"/></g></symbol>

let dbPromise = null;
function idb(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((res,rej)=>{
    const r = indexedDB.open('ktravel-photos',1);
    r.onupgradeneeded = e=>{
      const db = e.target.result;
      const s = db.createObjectStore('photos',{keyPath:'id'});
      s.createIndex('region','region',{unique:false});
    };
    r.onsuccess = e=>res(e.target.result);
    r.onerror = ()=>rej(r.error);
  });
  return dbPromise;
}
let photoCache = {}, stampRecs = {};
async function loadPhotos(){
  try{
    const db = await idb();
    const all = await new Promise((res,rej)=>{
      const rq = db.transaction('photos').objectStore('photos').getAll();
      rq.onsuccess = ()=>res(rq.result||[]); rq.onerror = ()=>rej(rq.error);
    });
    photoCache = {}; stampRecs = {};
    all.sort((a,b)=>a.ts-b.ts);
    for(const p of all){
      if(V1MAP[p.region]){ p.region = V1MAP[p.region]; putPhoto(p); } // v1 사진 이관
      if(p.region && p.region.startsWith('@stamp:')){ stampRecs[p.region.slice(7)] = p; continue; }
      (photoCache[p.region] = photoCache[p.region]||[]).push(p);
    }
  }catch(e){ photoCache = photoCache || {}; }
}
async function putPhoto(p){
  const db = await idb();
  await new Promise((res,rej)=>{
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').put(p);
    tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
  });
}
async function removePhoto(id){
  const db = await idb();
  await new Promise((res,rej)=>{
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').delete(id);
    tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
  });
}
async function clearPhotos(){
  const db = await idb();
  await new Promise((res,rej)=>{
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').clear();
    tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
  });
}
function photosOf(code){ return photoCache[code] || []; }

/* ================= 지도 구성 ================= */
const svg = document.getElementById('map');
svg.setAttribute('viewBox','0 0 '+MAP_W+' '+MAP_H);
const mapG = document.getElementById('mapG');
const muniG = document.getElementById('muniG');
const provG = document.getElementById('provG');
const labelsG = document.getElementById('labelsG');
const stampsG = document.getElementById('stampsG');
const tooltip = document.getElementById('tooltip');
const NS = 'http://www.w3.org/2000/svg';
const pathEls = {}, bboxCache = {};
let level = 'country', provSel = null, muniSel = null, curScale = 1;
for(const m of Object.values(MUNIS)) m.n = m.n.replace(/^(.+?시)(.+구)$/, '$1 $2');

for(const [code, m] of Object.entries(MUNIS)){
  const p = document.createElementNS(NS,'path');
  p.setAttribute('d', m.d);
  p.setAttribute('class','muni');
  p.dataset.code = code;
  p.setAttribute('tabindex','0');
  p.setAttribute('role','button');
  p.setAttribute('aria-label', (PROV_SHORT[m.p]||'')+' '+m.n);
  p.addEventListener('click', ev=>{ ev.stopPropagation(); muniClick(code); });
  p.addEventListener('keydown', ev=>{
    if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); muniClick(code); }
  });
  p.addEventListener('mousemove', ev=>showTooltip(ev, code));
  p.addEventListener('mouseleave', ()=>tooltip.classList.add('hidden'));
  muniG.appendChild(p);
  pathEls[code] = p;
}
const provPathEls = {};
for(const [code, pr] of Object.entries(PROVS)){
  const p = document.createElementNS(NS,'path');
  p.setAttribute('d', pr.d);
  provG.appendChild(p);
  provPathEls[code] = p;
}
svg.addEventListener('click', ()=>goUp());

function bboxOf(code){
  if(!bboxCache[code]) bboxCache[code] = pathEls[code].getBBox();
  return bboxCache[code];
}
function muniClick(code){
  const p = MUNIS[code].p;
  if(level==='country' || p!==provSel) selectProv(p);
  else selectMuni(code);
}
function goUp(){
  if(level==='muni') selectProv(provSel);
  else if(level==='prov') goCountry();
}
function zoomToBBox(bb, padF){
  const pad = Math.max(bb.width, bb.height)*padF + 6;
  const s = Math.min(MAP_W/(bb.width+pad*2), MAP_H/(bb.height+pad*2), 14);
  const cx = bb.x+bb.width/2, cy = bb.y+bb.height/2;
  mapG.style.transform = 'translate('+(MAP_W/2-s*cx)+'px,'+(MAP_H/2-s*cy)+'px) scale('+s+')';
  curScale = s;
}
function selectProv(p){
  level = 'prov'; provSel = p; muniSel = null; panelMode = null;
  zoomToBBox(provPathEls[p].getBBox(), 0.12);
  afterViewChange(); renderPanel();
}
function selectMuni(code){
  if(!MUNIS[code]){ if(PROVS[code]) selectProv(code); return; }
  level = 'muni'; muniSel = code; provSel = MUNIS[code].p; panelMode = null;
  zoomToBBox(bboxOf(code), 0.55);
  afterViewChange(); renderPanel();
}
function goCountry(){
  level = 'country'; provSel = null; muniSel = null; curScale = 1;
  mapG.style.transform = '';
  afterViewChange(); renderPanel();
}
document.getElementById('upBtn').addEventListener('click', goUp);
document.getElementById('yearChip').addEventListener('click', ()=>setYearFilter(null));
function scrollToEl(el){
  const y = el.getBoundingClientRect().top + window.scrollY - 8;
  window.scrollTo({top:y, behavior:'smooth'});
  setTimeout(()=>{
    const max = document.documentElement.scrollHeight - window.innerHeight;
    const target = Math.max(0, Math.min(y, max));
    if(Math.abs(window.scrollY - target) > 40) window.scrollTo(0, target);
  }, 400);
}
document.getElementById('goPanelBtn').addEventListener('click', ()=>
  scrollToEl(document.getElementById('panel')));

function afterViewChange(){
  document.getElementById('upBtn').classList.toggle('hidden', level==='country');
  document.getElementById('goPanelBtn').classList.toggle('show', level==='muni');
  tooltip.classList.add('hidden');
  paintMap(); updateLabels(); updateStampScale();
}

/* ---------- 칠하기 ---------- */
let yearFilter = null;
function isVisited(code){
  const r = store.regions[code];
  if(!r) return false;
  if(yearFilter) return r.trips.some(t=>(t.date||'').startsWith(yearFilter));
  return (r.visited || r.color || r.stamp || r.trips.length>0 || r.places.length>0 || photosOf(code).length>0);
}
function allYears(){
  const ys = new Set();
  for(const r of Object.values(store.regions))
    for(const t of r.trips) if(t.date) ys.add(t.date.slice(0,4));
  return [...ys].sort().reverse();
}
function setYearFilter(y){
  yearFilter = y || null;
  const chip = document.getElementById('yearChip');
  chip.classList.toggle('hidden', !yearFilter);
  if(yearFilter) chip.textContent = yearFilter+'년 여행만 보는 중 ✕';
  paintMap(); updateStampScale(); renderPanel();
}
function paintMap(){
  for(const [code, p] of Object.entries(pathEls)){
    const r = store.regions[code];
    p.classList.toggle('visited', isVisited(code) && !(r&&r.color));
    p.style.fill = (r && r.color && isVisited(code)) ? r.color : '';
    p.classList.toggle('dim', !!provSel && MUNIS[code].p!==provSel);
    p.classList.toggle('sel', code===muniSel);
  }
  const munisVisited = Object.keys(MUNIS).filter(isVisited).length;
  const provsVisited = new Set(Object.keys(MUNIS).filter(isVisited).map(c=>MUNIS[c].p)).size;
  document.getElementById('visitedCount').textContent = munisVisited;
  document.getElementById('provCount').textContent = provsVisited;
  document.getElementById('progressBar').style.width = (provsVisited/17*100)+'%';
}

/* ---------- 이름 라벨 ---------- */
const labelEls = {};
function updateLabels(){
  const show = (level!=='country') && curScale>=1.5;
  for(const el of Object.values(labelEls)) el.style.opacity = 0;
  if(!show) return;
  for(const [code, m] of Object.entries(MUNIS)){
    if(m.p!==provSel) continue;
    let el = labelEls[code];
    if(!el){
      el = document.createElementNS(NS,'text');
      const bb = bboxOf(code);
      el.setAttribute('x', bb.x+bb.width/2);
      el.setAttribute('y', bb.y+bb.height/2);
      el.textContent = m.n;
      labelsG.appendChild(el);
      labelEls[code] = el;
    }
    el.setAttribute('font-size', (12.5/curScale).toFixed(2));
    el.style.opacity = 1;
  }
}

/* ---------- 스탬프 ---------- */
const stampEls = {};
function stampBase(code){
  const bb = bboxOf(code);
  return Math.min(Math.min(bb.width, bb.height)*0.8, 34);
}
function rebuildStamps(){
  stampsG.innerHTML = '';
  for(const k of Object.keys(stampEls)) delete stampEls[k];
  for(const [code, r] of Object.entries(store.regions)){
    if(!r.stamp || !MUNIS[code]) continue;
    const isPhoto = r.stamp==='@photo';
    if(isPhoto ? !stampRecs[code] : !STAMPS[r.stamp]) continue;
    const bb = bboxOf(code);
    const gEl = document.createElementNS(NS,'g');
    gEl.setAttribute('class','stamp');
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('r','23');
    gEl.appendChild(c);
    if(isPhoto){
      const im = document.createElementNS(NS,'image');
      im.setAttribute('href', stampRecs[code].data);
      im.setAttribute('x','-19.5'); im.setAttribute('y','-19.5');
      im.setAttribute('width','39'); im.setAttribute('height','39');
      im.setAttribute('preserveAspectRatio','xMidYMid slice');
      im.setAttribute('clip-path','url(#stampClip)');
      gEl.appendChild(im);
    }else{
      const u = document.createElementNS(NS,'use');
      u.setAttribute('href','#st-'+r.stamp);
      u.setAttribute('x','-19'); u.setAttribute('y','-19');
      u.setAttribute('width','38'); u.setAttribute('height','38');
      gEl.appendChild(u);
    }
    gEl.dataset.cx = bb.x+bb.width/2;
    gEl.dataset.cy = bb.y+bb.height/2;
    gEl.dataset.base = stampBase(code);
    gEl.dataset.rot = (parseInt(code,10)%15)-7;
    gEl.dataset.prov = MUNIS[code].p;
    stampsG.appendChild(gEl);
    stampEls[code] = gEl;
  }
  updateStampScale();
}
function updateStampScale(){
  const s = curScale;
  for(const [code, gEl] of Object.entries(stampEls)){
    const base = +gEl.dataset.base;
    const visible = base*s >= 15 && (!provSel || gEl.dataset.prov===provSel || level==='country')
      && (!yearFilter || isVisited(code));
    gEl.style.opacity = visible ? 1 : 0;
    const D = Math.min(Math.max(base*s, 17), 54);   // 화면상 지름(px 근사)
    const k = D/(48*s);
    gEl.style.transform = 'translate('+gEl.dataset.cx+'px,'+gEl.dataset.cy+'px) rotate('+gEl.dataset.rot+'deg) scale('+k.toFixed(4)+')';
  }
}

/* ---------- 툴팁 ---------- */
function showTooltip(ev, code){
  const rect = svg.parentElement.getBoundingClientRect();
  const m = MUNIS[code];
  const sub = level==='country' ? (PROVS[m.p]?PROVS[m.p].n:'') :
    (isVisited(code) ? '기록 '+(region(code).trips.length+region(code).places.length+photosOf(code).length)+'건' : '아직 미방문');
  tooltip.innerHTML = '<b>'+esc(m.n)+'</b>'+(sub?'<small>'+esc(sub)+'</small>':'');
  tooltip.style.left = (ev.clientX-rect.left)+'px';
  tooltip.style.top = (ev.clientY-rect.top)+'px';
  tooltip.classList.remove('hidden');
}

/* ================= 패널 ================= */
const panel = document.getElementById('panel');
function totals(){
  let trips=0, places=0, photos=0;
  for(const r of Object.values(store.regions)){ trips+=r.trips.length; places+=r.places.length; }
  for(const arr of Object.values(photoCache)) photos+=arr.length;
  return {trips, places, photos};
}
function provVisitedCount(p){
  return Object.keys(MUNIS).filter(c=>MUNIS[c].p===p && isVisited(c)).length;
}
let panelMode = null; // null=홈 | munis/trips/places/photos=모아보기
function renderPanel(){
  if(level==='country'){ if(panelMode) renderListView(panelMode); else renderCountry(); }
  else if(level==='prov') renderProv();
  else renderMuni(muniSel);
}
function regionLabel(c){ return MUNIS[c] ? MUNIS[c].n : (PROVS[c] ? PROVS[c].n : ''); }

function renderCountry(){
  const t = totals();
  const munisVisited = Object.keys(MUNIS).filter(isVisited).length;
  const tripsShown = yearFilter ?
    Object.values(store.regions).reduce((n,r)=>n+r.trips.filter(x=>(x.date||'').startsWith(yearFilter)).length,0) : t.trips;
  let grid = '';

    const n = provVisitedCount(p);

      esc(PROV_SHORT[p])+'<span class="cnt">'+(n? n+'곳':'')+'</span></button>';
  }
  const ys = allYears();
  let yearRow = '';
  if(ys.length){
    yearRow = '<div class="year-row"><span>연도별</span>'+
      '<button class="ychip'+(yearFilter?'':' on')+'" data-y="">전체</button>'+
      ys.map(y=>'<button class="ychip'+(yearFilter===y?' on':'')+'" data-y="'+y+'">'+y+'</button>').join('')+
      '</div>';
  }
  panel.innerHTML =
    '<div class="panel-head"><h2>어디어디?!</h2></div>'+
    '<div class="stats">'+
      '<button class="stat" data-stat="munis"><b>'+munisVisited+'</b><span>'+(yearFilter? yearFilter+' 방문':'방문 시·군·구')+'</span></button>'+
      '<button class="stat" data-stat="trips"><b>'+tripsShown+'</b><span>여행 기록</span></button>'+
      '<button class="stat" data-stat="places"><b>'+t.places+'</b><span>맛집·명소</span></button>'+
      '<button class="stat" data-stat="photos"><b>'+t.photos+'</b><span>사진</span></button>'+
    '</div>'+
    yearRow+
    '<p class="hint">숫자를 누르면 전체 목록이 쫙 나와요. 지도에서 지역을 눌러 색을 칠하고, 스탬프나 내 사진을 붙여보세요.</p>'+
    '<div class="prov-grid">'+grid+'</div>';
  panel.querySelectorAll('[data-go]').forEach(b=>
    b.addEventListener('click', ()=>selectProv(b.dataset.go)));
  panel.querySelectorAll('.ychip').forEach(b=>
    b.addEventListener('click', ()=>setYearFilter(b.dataset.y)));
  panel.querySelectorAll('[data-stat]').forEach(b=>
    b.addEventListener('click', ()=>renderListView(b.dataset.stat)));
}

/* ---------- 모아보기 ---------- */
function renderListView(kind){
  panelMode = kind;
  const titles = {munis:'방문한 시·군·구', trips:'여행 기록 모아보기', places:'맛집·명소 모아보기', photos:'사진 모아보기'};
  let body = '';
  if(kind==='munis'){
    let rows = '';
    for(const p of PROV_ORDER){
      const ms = Object.keys(MUNIS).filter(c=>MUNIS[c].p===p && isVisited(c))
        .sort((a,b)=>MUNIS[a].n.localeCompare(MUNIS[b].n,'ko'));
      if(!ms.length) continue;
      rows += '<div class="list-sub">'+esc(PROVS[p]?PROVS[p].n:PROV_SHORT[p])+'</div>';
      for(const c of ms){
        const r = store.regions[c] || blankRegion();
        const cnt = r.trips.length + r.places.length + photosOf(c).length;
        rows += '<button class="list-item" data-go-muni="'+c+'"><i class="dot" style="background:'+
          ((r&&r.color)||'var(--accent)')+';border-color:transparent"></i>'+esc(MUNIS[c].n)+
          '<span class="cnt">'+(cnt? cnt+'건':'')+'</span></button>';
      }
    }
    body = rows || '<div class="empty">아직 방문한 곳이 없어요</div>';
  }else if(kind==='trips'){
    const all = [];
    for(const [c, r] of Object.entries(store.regions))
      for(const t of r.trips){
        if(yearFilter && !(t.date||'').startsWith(yearFilter)) continue;
        if(MUNIS[c]||PROVS[c]) all.push({c, t});
      }
    all.sort((a,b)=>(b.t.date||'').localeCompare(a.t.date||''));
    body = all.length ? all.map(({c, t})=>
      '<button class="list-item col" data-go-muni="'+c+'">'+
        '<span class="li-top"><b>'+esc(t.title||'여행')+'</b><span class="cnt">'+(t.date?fmtDate(t.date):'')+'</span></span>'+
        '<span class="li-sub">'+esc(regionLabel(c))+(t.memo?' · '+esc(t.memo.length>40?t.memo.slice(0,40)+'…':t.memo):'')+'</span>'+
      '</button>').join('')
      : '<div class="empty">아직 여행 기록이 없어요</div>';
  }else if(kind==='places'){
    const all = [];
    for(const [c, r] of Object.entries(store.regions))
      for(const pl of r.places){ if(MUNIS[c]||PROVS[c]) all.push({c, pl}); }
    body = all.length ? all.map(({c, pl})=>{
      const q = encodeURIComponent(regionLabel(c)+' '+pl.name);
      return '<div class="item">'+
        '<div class="t"><span class="badge-food">'+esc(pl.cat||'맛집')+'</span>'+esc(pl.name)+'</div>'+
        (pl.rating?'<div class="stars">'+'★'.repeat(pl.rating)+'<span style="opacity:.3">'+'★'.repeat(5-pl.rating)+'</span></div>':'')+
        '<div class="li-sub" style="margin-top:2px">'+esc(regionLabel(c))+'</div>'+
        (pl.memo?'<div class="m">'+esc(pl.memo)+'</div>':'')+
        '<div class="links">'+
          '<a class="lchip" target="_blank" rel="noopener" href="https://map.naver.com/p/search/'+q+'">네이버지도</a>'+
          '<a class="lchip" target="_blank" rel="noopener" href="https://map.kakao.com/?q='+q+'">카카오맵</a>'+
          '<button class="lchip" data-go-muni="'+c+'">지역 보기</button>'+
        '</div></div>'; }).join('')
      : '<div class="empty">저장한 맛집·명소가 없어요</div>';
  }else{ // photos
    const all = [];
    for(const [c, arr] of Object.entries(photoCache))
      for(const ph of arr){ if(MUNIS[c]||PROVS[c]) all.push({c, ph}); }
    all.sort((a,b)=>b.ph.ts-a.ph.ts);
    body = all.length ? '<div class="photo-grid">'+all.map(({c, ph})=>
      '<button data-lb="'+c+'|'+ph.id+'"><img src="'+ph.data+'" alt="'+esc(ph.caption||regionLabel(c)+' 사진')+'" loading="lazy"></button>').join('')+'</div>'
      : '<div class="empty">아직 사진이 없어요</div>';
  }
  panel.innerHTML =
    '<div class="panel-head">'+
      '<button class="back-btn" id="backBtn" aria-label="뒤로">←</button>'+
      '<div><h2>'+titles[kind]+'</h2>'+
      (yearFilter && (kind==='munis'||kind==='trips') ? '<span class="crumb">'+yearFilter+'년 기준</span>' : '')+
      '</div></div>'+
    '<div class="list-wrap">'+body+'</div>';

    b.addEventListener('click', ()=>selectMuni(b.dataset.goMuni)));

    const i = b.dataset.lb.indexOf('|');
    openLightbox(b.dataset.lb.slice(0,i), b.dataset.lb.slice(i+1));

}

function renderProv(){
  const p = provSel;
  const munis = Object.entries(MUNIS).filter(([c,m])=>m.p===p)
    .sort((a,b)=>a[1].n.localeCompare(b[1].n,'ko'));

  for(const [code, m] of munis){
    const r = store.regions[code];
    const cnt = r ? r.trips.length + r.places.length + photosOf(code).length : 0;
    const stampSvg = (r && r.stamp) ?
      (r.stamp==='@photo' && stampRecs[code]
        ? '<img class="mini-stamp" src="'+stampRecs[code].data+'" alt="" style="border-radius:50%;object-fit:cover">'
        : (STAMPS[r.stamp] ? '<svg class="mini-stamp" viewBox="0 0 40 40"><use href="#st-'+r.stamp+'"/></svg>' : '')) : '';
    grid += '<button data-go="'+code+'"><i class="dot"'+
      (isVisited(code)?' style="background:'+((r&&r.color)||'var(--accent)')+';border-color:transparent"':'')+
      '></i>'+esc(m.n)+stampSvg+'<span class="cnt">'+(cnt? cnt+'건':'')+'</span></button>';
  }

    '<div class="panel-head">'+
      '<button class="back-btn" id="backBtn" aria-label="뒤로">←</button>'+
      '<div><h2>'+esc(PROVS[p]?PROVS[p].n:PROV_SHORT[p])+'</h2>'+
      '<span class="crumb">방문 '+provVisitedCount(p)+' / '+munis.length+'곳</span></div>'+
    '</div>'+
    '<p class="hint">시·군·구를 선택해서 색을 칠하고 기록을 남겨보세요.</p>'+
    '<div class="muni-grid">'+grid+'</div>'+

      '<div class="sect" style="margin-top:16px"><div class="sect-head"><h3>시·도 전체 기록 (이전 버전)</h3></div></div>'+
      sectionsHTML(p, region(p), true);
    bindSections(p, true);
  }
}

function renderMuni(code){
  const r = region(code);

function sectionsHTML(code, r, legacy){
  const label = MUNIS[code] ? MUNIS[code].n : (PROVS[code]?PROVS[code].n:'');
  const photos = photosOf(code);
  let tripsHtml = r.trips.length ? '' : '<div class="empty">아직 여행 기록이 없어요</div>';
  for(const tr of [...r.trips].sort((a,b)=>(b.date||'').localeCompare(a.date||''))){
    tripsHtml += '<div class="item">'+
      '<div class="t">'+esc(tr.title||'여행')+'</div>'+
      (tr.date?'<div class="d">'+fmtDate(tr.date)+'</div>':'')+
      (tr.memo?'<div class="m">'+esc(tr.memo)+'</div>':'')+

      '<div class="t"><span class="badge-food">'+esc(pl.cat||'맛집')+'</span>'+esc(pl.name)+'</div>'+
      (pl.rating?'<div class="stars">'+'★'.repeat(pl.rating)+'<span style="opacity:.3">'+'★'.repeat(5-pl.rating)+'</span></div>':'')+
      (pl.memo?'<div class="m">'+esc(pl.memo)+'</div>':'')+
      '<div class="links">'+
        '<a class="lchip" target="_blank" rel="noopener" href="https://map.naver.com/p/search/'+q+'">네이버지도</a>'+
        '<a class="lchip" target="_blank" rel="noopener" href="https://map.kakao.com/?q='+q+'">카카오맵</a>'+
        '<a class="lchip" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query='+q+'">구글지도</a>'+
      '</div>'+

      '<button class="del" data-del-place="'+pl.id+'" title="삭제">✕</button></div>';

let stampPhotoTarget = null;
document.getElementById('stampPhotoInput').addEventListener('change', async ev=>{
  const f = ev.target.files[0];
  ev.target.value = '';
  if(!f || !stampPhotoTarget) return;

    const data = await downscaleSquare(f, 180, 0.82);

    await putPhoto(rec);
    stampRecs[code] = rec;
    region(code).stamp = '@photo';
    saveStore(); rebuildStamps(); paintMap();
    closeStampModal();
    if(muniSel===code) renderMuni(code);
    toast('내 사진 스탬프를 붙였어요');
  }catch(e){
    toast('사진을 처리하지 못했어요');
  }
});
function downscaleSquare(file, dim, q){
  return new Promise((res,rej)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const side = Math.min(img.width, img.height);
      const sx = (img.width-side)/2, sy = (img.height-side)/2;
      const c = document.createElement('canvas');
      c.width = dim; c.height = dim;
      c.getContext('2d').drawImage(img, sx, sy, side, side, 0, 0, dim, dim);
      res(c.toDataURL('image/jpeg', q));
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); rej(new Error('이미지를 읽을 수 없음')); };
    img.src = url;
  });
}

let photoTarget = null;
document.getElementById('photoInput').addEventListener('change', async ev=>{

      await putPhoto(p);

    }

    toast('사진 저장에 실패했어요 (저장 공간 부족일 수 있어요)');
  }
});
function downscale(file, maxDim, q){
  return new Promise((res,rej)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const s = Math.min(1, maxDim/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg', q));
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); rej(new Error('이미지를 읽을 수 없음')); };
    img.src = url;
  });
}

/* ================= 대표 이름 바꾸기 ================= */
const DEFAULT_TITLE = '우리어디';
function applyTitle(){
  const t = store.title || DEFAULT_TITLE;
  document.getElementById('appTitle').textContent = t;
  document.title = t;
}
document.getElementById('titleEditBtn').addEventListener('click', ()=>{
  if(document.getElementById('titleInput')) return;
  const span = document.getElementById('appTitle');
  const cur = store.title || DEFAULT_TITLE;
  const inp = document.createElement('input');
  inp.id = 'titleInput'; inp.className = 'title-input';
  inp.value = cur; inp.maxLength = 16;
  span.replaceWith(inp);
  inp.focus(); inp.select();
  const done = ()=>{
    const v = inp.value.trim();
    store.title = (v && v!==DEFAULT_TITLE) ? v : null;
    saveStore();
    const s = document.createElement('span'); s.id = 'appTitle';
    inp.replaceWith(s); applyTitle();
    if(v && v!==cur) toast('대표 이름을 바꿨어요');
  };
  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter') inp.blur();
    if(e.key==='Escape'){ inp.value = cur; inp.blur(); }
  });
  inp.addEventListener('blur', done);
});

  const photos = [];
  for(const arr of Object.values(photoCache)) photos.push(...arr);
  photos.push(...Object.values(stampRecs));
  const payload = {app:'ktravel', version:2, exportedAt:new Date().toISOString(),
    title:store.title||null, regions:store.regions, photos};
  const blob = new Blob([JSON.stringify(payload)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '국내여행지도-백업-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  toast('백업 파일을 내려받았어요');
});
document.getElementById('importBtn').addEventListener('click', ()=>
  document.getElementById('importInput').click());

function chooseImportMode(fileName){
  return new Promise(resolve=>{
    const ov = document.createElement('div');
    ov.className = 'modal';
    ov.innerHTML =
      '<div class="modal-box" style="width:min(420px,94vw)">'+
        '<div class="modal-head"><h3>백업 파일을 어떻게 불러올까요?</h3></div>'+
        '<div style="padding:4px 18px 18px;display:flex;flex-direction:column;gap:9px">'+
          '<p style="margin:0 0 2px;font-size:12.5px;color:var(--muted)">'+esc(fileName)+'</p>'+
          '<button class="btn primary" id="impMerge" style="padding:12px;line-height:1.4">내 기록에 합치기 (추천)<br>'+
            '<small style="font-weight:500;opacity:.85">내 기록은 그대로 두고 파일의 기록을 추가해요 — 친구와 지도 합칠 때</small></button>'+
          '<button class="btn ghost" id="impReplace" style="padding:12px;line-height:1.4">전체 교체<br>'+
            '<small style="font-weight:500">내 기록을 모두 지우고 파일 내용으로 바꿔요 — 기기 옮길 때</small></button>'+
          '<button class="btn ghost" id="impCancel">취소</button>'+
        '</div></div>';
    document.body.appendChild(ov);
    const done = v=>{ ov.remove(); resolve(v); };
    ov.querySelector('#impMerge').addEventListener('click', ()=>done('merge'));
    ov.querySelector('#impReplace').addEventListener('click', ()=>done('replace'));
    ov.querySelector('#impCancel').addEventListener('click', ()=>done(null));
    ov.addEventListener('click', e=>{ if(e.target===ov) done(null); });
  });
}

async function mergeData(data){
  const added = {trips:0, places:0, photos:0};
  for(const [k, v] of Object.entries(data.regions||{})){
    const code = V1MAP[k] || k;
    if(!MUNIS[code] && !PROVS[code]) continue;
    const r = region(code);
    if(v.visited) r.visited = true;
    if(v.color && !r.color) r.color = v.color;
    if(v.stamp && !r.stamp) r.stamp = v.stamp;
    const tIds = new Set(r.trips.map(t=>t.id));
    for(const t of (v.trips||[])) if(t && t.id && !tIds.has(t.id)){ r.trips.push(t); added.trips++; }
    const pIds = new Set(r.places.map(p=>p.id));
    for(const p of (v.places||[])) if(p && p.id && !pIds.has(p.id)){ r.places.push(p); added.places++; }
  }
  const haveIds = new Set();
  for(const arr of Object.values(photoCache)) for(const p of arr) haveIds.add(p.id);
  for(const p of (data.photos||[])){
    if(!p || !p.id || !p.data) continue;
    p.region = V1MAP[p.region] || p.region;
    if(typeof p.region==='string' && p.region.startsWith('@stamp:')){
      const code = p.region.slice(7);
      if(!stampRecs[code]){ await putPhoto(p); stampRecs[code] = p; }
      continue;
    }
    if(haveIds.has(p.id)) continue;
    if(!MUNIS[p.region] && !PROVS[p.region]) continue;
    await putPhoto(p);
    (photoCache[p.region] = photoCache[p.region]||[]).push(p);
    added.photos++;
  }
  saveStore();
  rebuildStamps(); paintMap(); renderPanel();
  toast('합치기 완료! 기록 '+added.trips+' · 장소 '+added.places+' · 사진 '+added.photos+'개가 추가됐어요');
}

document.getElementById('importInput').addEventListener('change', async ev=>{
  const f = ev.target.files[0];
  ev.target.value = '';
  if(!f) return;
  try{
    const data = JSON.parse(await f.text());
    if(data.app!=='ktravel' || !data.regions) throw new Error('형식 불일치');
    const mode = await chooseImportMode(f.name);
    if(!mode) return;
    if(mode==='merge'){ await mergeData(data); return; }
    const regions = {};
    for(const [k, v] of Object.entries(data.regions)){
      const nk = V1MAP[k] || k;
      regions[nk] = Object.assign(blankRegion(), v);
    }
    store = {regions, migrated:true, title:data.title||null};
    saveStore(); applyTitle();
    await clearPhotos();
    for(const p of (data.photos||[])){
      p.region = V1MAP[p.region] || p.region;
      await putPhoto(p);
    }
    await loadPhotos();
    rebuildStamps(); setYearFilter(null); goCountry(); toast('백업을 불러왔어요');
  }catch(e){
    toast('가져오기에 실패했어요 — 이 앱에서 내보낸 백업 파일인지 확인해 주세요');
  }
});
document.getElementById('resetBtn').addEventListener('click', async ()=>{
  if(!confirm('모든 여행 기록·맛집·사진·색·스탬프가 삭제됩니다. 정말 초기화할까요?')) return;
  store = {regions:{}, migrated:true}; saveStore(); applyTitle();
  await clearPhotos(); photoCache = {}; stampRecs = {};
  rebuildStamps(); setYearFilter(null); goCountry(); toast('초기화했어요');
});

/* ================= 토스트 ================= */
let toastTimer = null;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}

/* ================= 시작 ================= */
(async function init(){
  applyTitle();
  await loadPhotos();
  rebuildStamps();
  paintMap();
  renderPanel();
})();
</script>
